<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>
<link rel="stylesheet" href="signUpEcoTech.css">
<link rel="stylesheet" href="signUpOnlyEcoTech.css">
<body>
    <!-- <div id="ecotechh3andP">
        <div id="flexEcoTechH3AndP">
            <img src="Edited_Eco_Tech_Logo.jpg" alt="">
            <h3>ECOTECH</h3>
        </div>
        <p>Digital Minds. Creating Solutions</p>
    </div> -->
    <div id="videoWrapper">
        <video src="https://res.cloudinary.com/dkevg3kwp/video/upload/v1771691276/Black_and_blue_tech_background_ofdl9j.mp4" autoplay loop muted></video>
    </div>
    <div id="formWrapper">
           <div  class="flexEcoTechH3AndP">
            <img src="https://res.cloudinary.com/dkevg3kwp/image/upload/v1771690870/Edited_Eco_Tech_Logo_fi98m5.jpg"" alt="EcoTech Logo">
            <h2>ECOTECH</h2>
        </div>
        <p>Enter your credentials to access your account</p>
        <h3>Sign Up  </h3>
        <form action="">
            
            <div id="fullName">
                <div id="first_Name">
                    <label for="">FirstName:</label> <br>
                    <input required placeholder="First Name" type="text" name="First_Name" id="firstName"> <br>
                </div>
                <div id="last_Name">
                    <label for="lastName">Last Name:</label> <br>
                    <input required placeholder="Last Name" type="text" name="Last_Name" id="lastName"> <br>
                </div>
            </div>
            <label for="" id="Email">Email:</label> <br>
            <input required placeholder="abc@gmail.com" type="email" name="email" id="emailInput"> <br>
             <label for="" id="Password">Password:</label> <br>
            <input required placeholder="*********" type="password" name="pass_word" id="passwordInput"> <br>
                   <label for="" id="confirmPassword">Confirm Password</label> <br>
            <input required placeholder="*********" type="password" name="confirmPassword" id="confirmPasswordInput"> <br>
             <label for="" id="Department">Department</label> <br>
            <input required placeholder="Enter your department" type="text" name="department" id=""> <br>
           <label for="" id="level">Level:</label> <br>
                <select name="level" id="levelDropDown"> <br>
                    <optiongroup>
                        <option value="100">100</option>
                        <option value="200">200</option>
                        <option value="300">300</option>
                        <option value="400">400</option>
                        <option value="500">500</option>
                        <option value="600">600</option>
                        <option value="700">700</option>
                    </optiongroup>
                </select> <br> <br>
            <label for="" id="gender">Gender:</label> <br>
            <div id="Gender">
                <div>
                    <label for="">Male</label>
                    <input required placeholder="2" type="radio" name="1" id="maleGenderInput">
                </div>
                <div>
                    <label for="">Female</label>
                    <input required placeholder="3" type="radio" name="1" id="femaleGenderInput"> <br>
                </div>
            </div>
            <label for="" id="dateOfBirth">Date of Birth</label> <br>
            <input required placeholder="01/01/2000" type="date" name="dateOfBirth" id="dateOfBirth"> <br>
           <label for="" id="subTeams">
           Which Team would you like to join?
           </label> <br>
            <select required name="subTeams" id="subTeams"> <br>
                <optiongroup>
                    <option value="Project Management">Project Management</option>
                        <option value="Web Development">Web Development</option>
                        <option value="Data Analysis and Econometrics">Econometrics and Data Analysis</option>
                        <option value="Social Media Management">Social Media Management</option>
                    </optiongroup>
                </select> <br> <br>
                <div id="flexRememberAndForgot">
            <div id="checkboxAndRemember">
                <input id="checkbox" type="checkbox">
                <label id="Remember">Remember me</label>
            </div>
            <a href="">Forgot Password?</a> <br>
        </div>
        <button type="button" id="submit">Submit</button>
        
        </form>
    </div>
</body>
</html>
